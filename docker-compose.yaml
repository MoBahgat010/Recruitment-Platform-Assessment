services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pandy_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pandy_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: pandy_ai
    ports:
      - "3000:3000"
    command: sh -c "npm run db:init && npm run seed && npm run start:dev"
    volumes:
      - ./:/app

volumes:
  db-data:
